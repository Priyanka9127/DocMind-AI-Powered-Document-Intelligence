apiVersion: v1
kind: ConfigMap
metadata:
  name: docmind-config
  namespace: docmind
data:
  # Internal URL of Ollama service within the cluster
  OLLAMA_BASE_URL: "http://ollama-service.docmind.svc.cluster.local:11434"
  ENVIRONMENT: "production"

---
apiVersion: v1
kind: Secret
metadata:
  name: docmind-secrets
  namespace: docmind
type: Opaque
data:
  # Example placeholder for base64 encoded secrets
  # echo -n "my-secret-key" | base64
  EXAMPLE_SECRET: bXktc2VjcmV0LWtleQ==
